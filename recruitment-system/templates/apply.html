<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Apply Job</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #dfe9f3, #ffffff);
            margin: 0;
            padding: 0;
        }

        .container {
            width: 420px;
            margin: 50px auto;
            background: #fff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 10px;
        }

        p {
            text-align: center;
            color: gray;
            margin-bottom: 20px;
        }

        label {
            font-size: 14px;
            font-weight: 500;
            margin-top: 10px;
            display: block;
        }

        input, select {
            width: 100%;
            padding: 12px;
            margin-top: 5px;
            border-radius: 8px;
            border: 1px solid #ccc;
            outline: none;
            transition: 0.3s;
        }

        input:focus, select:focus {
            border-color: #6c63ff;
        }

        /* Upload Box */
        .upload-box {
            border: 2px dashed #ccc;
            padding: 20px;
            text-align: center;
            border-radius: 10px;
            margin-top: 10px;
            cursor: pointer;
            transition: 0.3s;
            display: block;
        }

        .upload-box:hover {
            border-color: #6c63ff;
        }

        .upload-box input {
            display: none;
        }

        button {
            width: 100%;
            margin-top: 20px;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(90deg, #6c63ff, #5a54e6);
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            opacity: 0.9;
        }

        .success {
            background: #d4edda;
            color: #155724;
            padding: 10px;
            margin-top: 15px;
            border-radius: 8px;
            text-align: center;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Join Our Team</h2>
    <h2>HireBridge - Job Application</h2>
    <p>Fill out the form below to apply</p>

    <form method="POST" enctype="multipart/form-data">

        <label>Full Name</label>
        <input type="text" name="name" required placeholder="John Doe">

        <label>Email Address</label>
        <input type="email" name="email" required placeholder="john@example.com">

        <label>Years of Experience</label>
        <select name="experience" required>
            <option value="">Select experience level</option>
            <option>Fresher</option>
            <option>1-2 Years</option>
            <option>3-5 Years</option>
            <option>5+ Years</option>
        </select>

        <label>Key Skills</label>
        <input type="text" name="skills" placeholder="Python, SQL, ML">

        <label>Expected CTC</label>
        <input type="text" name="ctc" placeholder="e.g. 5 LPA">

        <!-- ✅ FIXED UPLOAD SECTION -->
        <label>Upload Resume</label>
        <label class="upload-box">
            <span id="file-text">Click to upload (PDF, DOC, DOCX)</span>
            <input type="file" id="resume" name="resume" accept=".pdf,.doc,.docx" required>
        </label>

        <button type="submit">Submit Application</button>

    </form>

    {% if success %}
        <div class="success">
            ✅ Application Submitted Successfully!
        </div>
    {% endif %}

</div>

<!-- ✅ SCRIPT FOR FILE NAME DISPLAY -->
<script>
    const fileInput = document.getElementById("resume");
    const fileText = document.getElementById("file-text");

    fileInput.addEventListener("change", function () {
        if (fileInput.files.length > 0) {
            fileText.innerText = "Selected: " + fileInput.files[0].name;
        }
    });
</script>

</body>
</html>
